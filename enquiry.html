<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nik Naks | Enquiry & Wholesale Hub</title>
    <!-- Google Fonts + Font Awesome 6 (free) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(125deg, #fff7e6 0%, #ffe6c9 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* decorative snack elements */
        body::before {
            content: "🍿 🍬 🥨 🍪";
            font-size: 110px;
            opacity: 0.08;
            position: fixed;
            bottom: 10px;
            right: 0;
            pointer-events: none;
            white-space: pre;
            transform: rotate(-8deg);
            letter-spacing: 15px;
        }

        /* main card */
        .enquiry-container {
            max-width: 880px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.12), 0 10px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }

        /* brand header */
        .brand-header {
            background: #F2622E;  /* bold orange reminiscent of snack packaging */
            padding: 1.8rem 2.2rem 1.5rem 2.2rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .brand-header::after {
            content: "✨";
            font-size: 110px;
            position: absolute;
            bottom: -25px;
            right: -20px;
            opacity: 0.2;
            pointer-events: none;
            transform: rotate(10deg);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .logo-icon {
            background: rgba(255,255,240,0.25);
            width: 54px;
            height: 54px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            backdrop-filter: blur(2px);
        }

        .brand-header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
            line-height: 1.2;
        }

        .brand-header .tagline {
            font-weight: 500;
            opacity: 0.92;
            font-size: 0.95rem;
            margin-top: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tagline i {
            font-size: 0.85rem;
        }

        /* form panel */
        .form-panel {
            padding: 2.2rem 2.2rem 2rem;
        }

        .two-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-field {
            margin-bottom: 1.1rem;
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #3b2a1f;
            margin-bottom: 0.45rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .required {
            color: #F2622E;
            font-size: 0.8rem;
        }

        input, select, textarea {
            font-family: 'Plus Jakarta Sans', sans-serif;
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid #f0e0cf;
            border-radius: 1.2rem;
            font-size: 0.9rem;
            background-color: #fefcf8;
            transition: all 0.2s;
            outline: none;
            color: #2d2418;
            font-weight: 500;
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #F2622E;
            box-shadow: 0 0 0 3px rgba(242, 98, 46, 0.15);
            background-color: #ffffff;
        }

        /* error & success */
        .error-message {
            font-size: 0.7rem;
            color: #d9534f;
            margin-top: 5px;
            margin-left: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .input-field.error input,
        .input-field.error select,
        .input-field.error textarea {
            border-color: #d9534f;
            background-color: #fff6f5;
        }

        .success-banner {
            background: #E9F7EC;
            border-radius: 1.5rem;
            padding: 1rem 1.4rem;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 14px;
            border-left: 5px solid #2e7d32;
            color: #1e4620;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        .success-banner i {
            font-size: 1.7rem;
            color: #2e7d32;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* action buttons */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .btn-submit {
            background: #F2622E;
            border: none;
            padding: 0.9rem 1.6rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s;
            flex: 1;
            justify-content: center;
            font-family: inherit;
            box-shadow: 0 6px 14px rgba(242, 98, 46, 0.3);
        }

        .btn-submit:hover {
            background: #d84e1c;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(242, 98, 46, 0.35);
        }

        .btn-reset {
            background: #f5ede4;
            border: 1px solid #e7d9ce;
            padding: 0.9rem 1.6rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #5c4b38;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            justify-content: center;
            font-family: inherit;
        }

        .btn-reset:hover {
            background: #e6d9cf;
            border-color: #d4c2b2;
            color: #3b2a1f;
        }

        .footnote {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #a68b72;
            border-top: 1px solid #f0e3d8;
            padding-top: 1.2rem;
        }

        @media (max-width: 680px) {
            .two-col-grid {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .full-width {
                grid-column: span 1;
            }
            .form-panel {
                padding: 1.5rem;
            }
            .brand-header {
                padding: 1.4rem 1.5rem;
            }
            .brand-header h1 {
                font-size: 1.6rem;
            }
        }

        /* custom select arrow */
        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23F2622E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 14px;
        }
    </style>
</head>
<body>
<div class="enquiry-container">
    <div class="brand-header">
        <div class="logo-area">
            <div class="logo-icon">🍿</div>
            <h1>Nik Naks <span style="font-weight:500;">Enquiry</span></h1>
        </div>
        <div class="tagline">
            <i class="fas fa-bag-shopping"></i> Wholesale • Product questions • Custom mixes 
            <i class="fas fa-heart" style="margin-left:6px;"></i>
        </div>
        <div class="tagline" style="font-size:0.8rem; margin-top:8px;">
            We reply within 12–24 hours — let’s snack & talk!
        </div>
    </div>

    <div class="form-panel">
        <!-- success message container (dynamic) -->
        <div id="successAlert" class="success-banner" style="display: none;">
            <i class="fas fa-check-circle"></i>
            <span id="successMessageText">✨ Thanks! Your enquiry has landed safely. Our Nik Naks crew will reach out soon.</span>
        </div>

        <form id="nikNaksForm" novalidate>
            <div class="two-col-grid">
                <!-- Full name -->
                <div class="input-field full-width" id="nameField">
                    <label><i class="fas fa-user"></i> Full name <span class="required">*</span></label>
                    <input type="text" id="fullName" placeholder="e.g., Jamie Rivers" autocomplete="name">
                    <div class="error-message" id="nameError"></div>
                </div>

                <!-- Email -->
                <div class="input-field" id="emailField">
                    <label><i class="fas fa-envelope"></i> Email <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="hello@niknaks.com" autocomplete="email">
                    <div class="error-message" id="emailError"></div>
                </div>

                <!-- Phone (optional) -->
                <div class="input-field" id="phoneField">
                    <label><i class="fas fa-phone-alt"></i> Phone <span style="font-weight:400;">(optional)</span></label>
                    <input type="tel" id="phone" placeholder="+1 555 123 4567">
                    <div class="error-message" id="phoneError"></div>
                </div>

                <!-- Enquiry Topic (dropdown) -->
                <div class="input-field" id="topicField">
                    <label><i class="fas fa-list-ul"></i> Enquiry type <span class="required">*</span></label>
                    <select id="enquiryTopic">
                        <option value="" disabled selected>– Select topic –</option>
                        <option value="general">💬 General question</option>
                        <option value="wholesale">📦 Wholesale / Bulk order</option>
                        <option value="product">🍿 Product feedback / suggestion</option>
                        <option value="collab">🤝 Collaboration & events</option>
                        <option value="other">✨ Other</option>
                    </select>
                    <div class="error-message" id="topicError"></div>
                </div>

                <!-- Product of interest (nice extra) -->
                <div class="input-field" id="productInterestField">
                    <label><i class="fas fa-candy-cane"></i> Product interest (optional)</label>
                    <input type="text" id="productInterest" placeholder="e.g., salted caramel popcorn, snack mix, gift box">
                    <div class="error-message" id="productInterestError"></div>
                </div>

                <!-- Message field -->
                <div class="input-field full-width" id="messageField">
                    <label><i class="fas fa-comment-dots"></i> Your message <span class="required">*</span></label>
                    <textarea id="message" placeholder="Tell us everything – flavour ideas, order details, or just a snack chat..."></textarea>
                    <div class="error-message" id="messageError"></div>
                </div>
            </div>

            <div class="action-buttons">
                <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Send enquiry</button>
                <button type="button" id="clearFormBtn" class="btn-reset"><i class="fas fa-undo-alt"></i> Clear form</button>
            </div>
            <div class="footnote">
                <i class="fas fa-lock-alt"></i> Your info is safe with Nik Naks — no spam, only crunchy replies.
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const form = document.getElementById('nikNaksForm');
        const fullName = document.getElementById('fullName');
        const email = document.getElementById('email');
        const phone = document.getElementById('phone');
        const enquiryTopic = document.getElementById('enquiryTopic');
        const productInterest = document.getElementById('productInterest');
        const message = document.getElementById('message');
        const clearBtn = document.getElementById('clearFormBtn');
        const successAlert = document.getElementById('successAlert');
        const successMsgSpan = document.getElementById('successMessageText');

        // error containers
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const phoneError = document.getElementById('phoneError');
        const topicError = document.getElementById('topicError');
        const messageError = document.getElementById('messageError');
        const productInterestError = document.getElementById('productInterestError');

        // Helper: remove error style + message
        function clearFieldError(fieldElement, errorSpan, fieldContainerId) {
            const container = document.getElementById(fieldContainerId);
            if (container) container.classList.remove('error');
            if (errorSpan) errorSpan.innerHTML = '';
        }

        function setFieldError(fieldContainerId, errorSpan, messageText) {
            const container = document.getElementById(fieldContainerId);
            if (container) container.classList.add('error');
            if (errorSpan) {
                errorSpan.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${messageText}`;
            }
        }

        // Hide global success banner
        function hideSuccess() {
            if (successAlert) successAlert.style.display = 'none';
        }

        function showSuccess(customMsg = null) {
            const msg = customMsg || "✨ Thanks for reaching out! Your enquiry has been received. Our Nik Naks team will reply within 24h with crunchy news 🍿";
            successMsgSpan.innerText = msg;
            successAlert.style.display = 'flex';
            // auto scroll to success message
            successAlert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            // optional: auto hide after 7 seconds
            setTimeout(() => {
                if (successAlert.style.display === 'flex') {
                    // don't hide if new submission triggered but fine
                }
            }, 7000);
        }

        // validation helpers
        function validateName() {
            const val = fullName.value.trim();
            if (val === '') {
                setFieldError('nameField', nameError, 'Full name is required');
                return false;
            }
            if (val.length < 2) {
                setFieldError('nameField', nameError, 'Enter a valid name (min 2 characters)');
                return false;
            }
            clearFieldError(null, nameError, 'nameField');
            return true;
        }

        function validateEmail() {
            const emailVal = email.value.trim();
            if (emailVal === '') {
                setFieldError('emailField', emailError, 'Email address is required');
                return false;
            }
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailRegex.test(emailVal)) {
                setFieldError('emailField', emailError, 'Please enter a valid email (e.g., name@domain.com)');
                return false;
            }
            clearFieldError(null, emailError, 'emailField');
            return true;
        }

        function validatePhone() {
            const phoneVal = phone.value.trim();
            if (phoneVal === '') {
                clearFieldError(null, phoneError, 'phoneField');
                return true; // optional, always valid if empty
            }
            // relaxed international format: digits, spaces, +, -, parentheses
            const phoneRegex = /^[\+\s\d\-\(\)]{6,20}$/;
            if (!phoneRegex.test(phoneVal)) {
                setFieldError('phoneField', phoneError, 'Enter a valid phone number (digits, spaces, +, -)');
                return false;
            }
            clearFieldError(null, phoneError, 'phoneField');
            return true;
        }

        function validateTopic() {
            const topic = enquiryTopic.value;
            if (!topic || topic === '') {
                setFieldError('topicField', topicError, 'Please select an enquiry type');
                return false;
            }
            clearFieldError(null, topicError, 'topicField');
            return true;
        }

        function validateMessage() {
            const msgVal = message.value.trim();
            if (msgVal === '') {
                setFieldError('messageField', messageError, 'Message cannot be empty — tell us what you need!');
                return false;
            }
            if (msgVal.length < 8) {
                setFieldError('messageField', messageError, 'Message must be at least 8 characters');
                return false;
            }
            clearFieldError(null, messageError, 'messageField');
            return true;
        }

        // optional product interest: just trimming, no error needed
        function validateProductInterest() {
            // no error, just trim extra, never required
            clearFieldError(null, productInterestError, 'productInterestField');
            return true;
        }

        // full form validation
        function validateForm() {
            const isNameValid = validateName();
            const isEmailValid = validateEmail();
            const isPhoneValid = validatePhone();
            const isTopicValid = validateTopic();
            const isMessageValid = validateMessage();
            const isProductValid = validateProductInterest(); // always true
            return isNameValid && isEmailValid && isPhoneValid && isTopicValid && isMessageValid && isProductValid;
        }

        // clear entire form and errors + hide success
        function resetFormFields() {
            form.reset();  // native reset
            // manually clear all error states and extra fields (select placeholder etc)
            fullName.value = '';
            email.value = '';
            phone.value = '';
            enquiryTopic.value = '';
            productInterest.value = '';
            message.value = '';
            // remove error classes and messages
            const allContainers = ['nameField', 'emailField', 'phoneField', 'topicField', 'productInterestField', 'messageField'];
            allContainers.forEach(containerId => {
                const container = document.getElementById(containerId);
                if (container) container.classList.remove('error');
            });
            const errorSpans = [nameError, emailError, phoneError, topicError, productInterestError, messageError];
            errorSpans.forEach(span => { if (span) span.innerHTML = ''; });
            hideSuccess();
        }

        // Submit handler
        function onSubmitHandler(e) {
            e.preventDefault();
            hideSuccess(); // hide any previous success banner
            
            const isValid = validateForm();
            if (!isValid) {
                // scroll to first error
                const firstErrorField = document.querySelector('.input-field.error');
                if (firstErrorField) {
                    firstErrorField.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return;
            }
            
            // gather data for pretty confirmation
            const nameValue = fullName.value.trim().split(' ')[0];
            const topicLabel = enquiryTopic.options[enquiryTopic.selectedIndex]?.text || 'enquiry';
            const productInfo = productInterest.value.trim() ? ` (interest: ${productInterest.value.trim()})` : '';
            
            // simulate sending enquiry (no actual backend, but show success)
            const successMsg = `🍿 Thanks ${nameValue}! Your ${topicLabel} has been sent${productInfo}. We'll crunch back ASAP.`;
            showSuccess(successMsg);
            
            // optional: clear only after success? but we keep fields for reference, user can clear manually.
            // do NOT reset automatically to avoid frustration. but we optionally add a small highlight
            // also we can log to console
            console.log({
                name: fullName.value,
                email: email.value,
                phone: phone.value,
                topic: enquiryTopic.value,
                product: productInterest.value,
                message: message.value
            });
            
            // bonus: add subtle border flash on success
            form.style.transition = '0.2s';
            form.style.boxShadow = '0 0 0 2px #F2622E, 0 4px 12px rgba(0,0,0,0.1)';
            setTimeout(() => { form.style.boxShadow = ''; }, 800);
        }
        
        // Attach live blur validations for better UX
        function attachLiveValidation() {
            fullName.addEventListener('blur', validateName);
            email.addEventListener('blur', validateEmail);
            phone.addEventListener('blur', validatePhone);
            enquiryTopic.addEventListener('change', validateTopic);
            message.addEventListener('blur', validateMessage);
            productInterest.addEventListener('blur', validateProductInterest);
            // optional real-time while typing reset errors? fine
            fullName.addEventListener('input', () => clearFieldError(null, nameError, 'nameField'));
            email.addEventListener('input', () => clearFieldError(null, emailError, 'emailField'));
            phone.addEventListener('input', () => clearFieldError(null, phoneError, 'phoneField'));
            enquiryTopic.addEventListener('focus', () => clearFieldError(null, topicError, 'topicField'));
            message.addEventListener('input', () => clearFieldError(null, messageError, 'messageField'));
        }
        
        // clear button event
        clearBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resetFormFields();
            // also reset any extra success hide
            hideSuccess();
            // optionally give visual feedback
            const containerDiv = document.querySelector('.enquiry-container');
            if(containerDiv) {
                containerDiv.style.transform = 'scale(0.99)';
                setTimeout(() => { containerDiv.style.transform = ''; }, 150);
            }
        });
        
        // attach form listener
        form.addEventListener('submit', onSubmitHandler);
        attachLiveValidation();
        
        // initial clean state
        resetFormFields(); // ensures no pre-filled errors, but not wiping prefill? it's ok to start empty.
        // However we want empty fields initially but not errors, resetFormFields clears errors, good.
        // Additionally ensure that select placeholder shows default selected disabled option
        // but resetFormFields sets value to empty string, we need to set selectedIndex to 0
        // improve initial select placeholder
        if(enquiryTopic) enquiryTopic.selectedIndex = 0;
    })();
</script>
</body>
</html>
